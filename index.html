<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>วันจุดประทีป</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
margin:0;
padding:0;

background:url("images/chedi.jpg") center/cover no-repeat fixed;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;
}

/* กล่องเนื้อหา */

.container{

position:relative;

/* โปร่งใสมากขึ้น */

background:rgba(255,255,255,0.40);

backdrop-filter:blur(6px);

padding:30px 18px;

border-radius:20px;

box-shadow:0 6px 25px rgba(0,0,0,0.25);

max-width:480px;
width:90%;

text-align:center;

}

/* ไอคอนประทีป */

.lamp{
font-size:90px;
animation:flicker 2s infinite;
}

/* หัวข้อ */

h1{
font-size:36px;
color:#c0392b;
margin:10px 0;
}

/* ตัวเลขวัน */

.counter{
font-size:42px;
font-weight:bold;
color:#d35400;

margin-top:16px;
line-height:1.4;
}

/* ปี เดือน วัน */

.details{
font-size:22px;
margin-top:8px;
color:#222;
}

/* วันที่วันนี้ */

.today{
margin-top:16px;
font-size:19px;
color:#222;
}
