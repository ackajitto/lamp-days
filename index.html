<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>อนุโมทนาบุญจุดประทีปบูชาเจดีย์</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
margin:0;
padding:50px 0;
background:url("images/chedi.jpg") center/cover no-repeat fixed;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(6px);
padding:26px 20px;
border-radius:22px;
max-width:480px;
width:75%;
text-align:center;
}

.lamp{
font-size:90px;
animation:flicker 2s infinite;
}

h1{
font-size:40px;
color:#c0392b;
margin:10px 0;
font-weight:700;
}

.counter{
font-size:42px;
font-weight:bold;
color:#d35400;
margin-top:16px;
line-height:1.4;
}

.details{
font-size:22px;
margin-top:8px;
color:#222;
}

.today{
margin-top:16px;
font-size:20px;
color:#222;
}

/* วิดีโอ */

.video{
margin-top:20px;
border-radius:16px;
overflow:hidden;
max-width:320px;
margin-left:auto;
margin-right:auto;
}

.video iframe{
width:100%;
height:560px;
border:0;
}

/* ข้อความอธิษฐาน */

.prayer{
margin-top:22px;
font-size:18px;
line-height:1.7;
color:#5a3b2e;
}

/* คำบูชา */

.blessing{
margin-top:24px;
padding-top:18px;
border-top:1px solid #ddd;
}

.blessing-title{
font-size:24px;
font-weight:bold;
color:#6b3f1f;
margin-bottom:10px;
}

.pali{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.translate{
font-size:18px;
color:#333;
}

/* ปุ่ม */

.actions{
margin-top:25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:12px;
}

.merit-btn{
display:flex;
align-items:center;
gap:10px;
background:#c0392b;
color:white;
border:none;
padding:10px 16px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.merit-btn:hover{
transform:scale(1.05);
}

/* เอฟเฟกต์ระยิบ */

.sparkle{
position:absolute;
font-size:18px;
animation:sparkle 1s ease-out forwards;
}

@keyframes sparkle{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-40px)}
}

.share{
display:flex;
align-items:center;
gap:12px;
}

.share img{
width:34px;
cursor:pointer;
}

/* มือถือ */

@media(max-width:600px){

.lamp{font-size:80px;}

h1{font-size:33px;}

.counter{font-size:36px;}

.details{font-size:24px;}

.today{font-size:22px;}

.video iframe{
height:520px;
}

}

@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:0.8}
}

</style>

</head>

<body>

<div class="container">

<div class="lamp">🪔</div>

<h1>อนุโมทนาบุญ</h1>

<div id="days" class="counter"></div>

<div id="details" class="details"></div>

<div class="today">
เริ่มจุดประทีปตั้งแต่<br>
วันที่ 25 มีนาคม พ.ศ. 2564
</div>

<div id="today" class="today"></div>

<div class="video">
<iframe
src="https://www.youtube.com/embed/HwiobATjsSw"
title="YouTube Shorts"
allowfullscreen>
</iframe>
</div>

<div class="prayer">
ขอให้ชีวิตเจริญรุ่งเรือง พ้นทุกข์โศกโรคภัย<br>
มีปัญญาธรรม สมปรารถนาทุกประการ<br>
อุทิศผลบุญให้ พ่อ-แม่-ญาติพี่น้อง
</div>

<div class="blessing">

<div class="blessing-title">
คำกล่าวบูชาพระเจดีย์ด้วยประทีป
</div>

<div class="pali">
อิมินา ปทีเปน พุทธเจติยํ ปูเชมิ
</div>

<div class="translate">
ข้าพเจ้าขอบูชาพระพุทธเจดีย์ ด้วยประทีปนี้
</div>

</div>

<div class="actions">

<button class="merit-btn" onclick="addMerit(event)">
🌸 ร่วมอนุโมทนา
<span id="meritCount">1,250,510</span>
</button>

<div class="share">

<a href="https://line.me/R/msg/text/?อนุโมทนาบุญจุดประทีปบูชาเจดีย์ https://ackajitto.github.io/lamp-days/" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg">
</a>

<a href="https://www.facebook.com/sharer/sharer.php?u=https://ackajitto.github.io/lamp-days/" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
</a>

</div>

</div>

</div>

<script>

const startDate = new Date('2021-03-25');
const today = new Date();

startDate.setHours(0,0,0,0);
today.setHours(0,0,0,0);

const diffMs = today - startDate;
const days = Math.floor(diffMs/(1000*60*60*24))+1;

document.getElementById("days").innerHTML=
`จุดประทีปบูชาเจดีย์<br>พระพุทธเจ้า 1 ล้านพระองค์<br>มาแล้ว ${days} วัน`;

let years = today.getFullYear()-startDate.getFullYear();
let months = today.getMonth()-startDate.getMonth();
let daysRemain = today.getDate()-startDate.getDate();

if(daysRemain<0){
months--;
daysRemain+=new Date(today.getFullYear(),today.getMonth(),0).getDate();
}

if(months<0){
years--;
months+=12;
}

document.getElementById("details").innerText=
`เท่ากับ ${years} ปี ${months} เดือน ${daysRemain} วัน`;

const thaiMonths=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

const day=today.getDate();
const month=thaiMonths[today.getMonth()];
const year=today.getFullYear()+543;

document.getElementById("today").innerText=
`วันนี้วันที่ ${day} ${month} พ.ศ. ${year}`;

/* ปุ่มอนุโมทนา */

function addMerit(e){

let count=document.getElementById("meritCount");

let num=parseInt(count.innerText.replace(/,/g,""));

num++;

count.innerText=num.toLocaleString();

/* เอฟเฟกต์ระยิบ */

for(let i=0;i<6;i++){

let sparkle=document.createElement("div");

sparkle.className="sparkle";

sparkle.innerHTML="✨";

sparkle.style.left=(e.pageX+(Math.random()*30-15))+"px";
sparkle.style.top=(e.pageY+(Math.random()*30-15))+"px";

document.body.appendChild(sparkle);

setTimeout(()=>sparkle.remove(),1000);

}

}

</script>

</body>
</html>
