<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>อนุโมทนาบุญจุดประทีปบูชาเจดีย์</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
margin:0;

/* เพิ่มช่องว่างบนล่าง */

padding:50px 0;

background:url("images/chedi.jpg") center/cover no-repeat fixed;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:rgba(255,255,255,0.5);
backdrop-filter:blur(6px);
padding:24px 18px;
border-radius:20px;
max-width:480px;
width:75%;
text-align:center;
}

.lamp{
font-size:90px;
animation:flicker 2s infinite;
}

h1{
font-size:40px;
color:#c0392b;
margin:10px 0;
font-weight:700;
}

.counter{
font-size:42px;
font-weight:bold;
color:#d35400;
margin-top:16px;
line-height:1.4;
}

.details{
font-size:22px;
margin-top:8px;
color:#222;
}

.today{
margin-top:16px;
font-size:20px;
color:#222;
}

/* วิดีโอแนวตั้ง */

.video{
margin-top:20px;
border-radius:16px;
overflow:hidden;
max-width:320px;
margin-left:auto;
margin-right:auto;
}

.video iframe{
width:100%;
height:560px;
border:0;
}

@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:0.8}
}

/* มือถือ */

@media(max-width:600px){

.lamp{font-size:80px;}

h1{font-size:33px;}

.counter{font-size:36px;}

.details{font-size:24px;}

.today{font-size:22px;}

.video iframe{
height:520px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="lamp">🪔</div>

<h1>อนุโมทนาบุญ</h1>

<div id="days" class="counter"></div>

<div id="details" class="details"></div>

<div class="today">
เริ่มจุดประทีปตั้งแต่<br>
วันที่ 25 มีนาคม พ.ศ. 2564
</div>

<div id="today" class="today"></div>

<div class="video">
<iframe
src="https://www.youtube.com/embed/HwiobATjsSw"
title="YouTube Shorts"
allowfullscreen>
</iframe>
</div>

</div>

<script>

const startDate = new Date('2021-03-25');
const today = new Date();

startDate.setHours(0,0,0,0);
today.setHours(0,0,0,0);

const diffMs = today - startDate;
const days = Math.floor(diffMs/(1000*60*60*24))+1;

document.getElementById("days").innerHTML=
`จุดประทีปบูชาเจดีย์<br>พระพุทธเจ้า 1 ล้านพระองค์<br>มาแล้ว ${days} วัน`;

let years = today.getFullYear()-startDate.getFullYear();
let months = today.getMonth()-startDate.getMonth();
let daysRemain = today.getDate()-startDate.getDate();

if(daysRemain<0){
months--;
daysRemain+=new Date(today.getFullYear(),today.getMonth(),0).getDate();
}

if(months<0){
years--;
months+=12;
}

document.getElementById("details").innerText=
`เท่ากับ ${years} ปี ${months} เดือน ${daysRemain} วัน`;

const thaiMonths=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

const day=today.getDate();
const month=thaiMonths[today.getMonth()];
const year=today.getFullYear()+543;

document.getElementById("today").innerText=
`วันนี้วันที่ ${day} ${month} พ.ศ. ${year}`;

</script>

</body>
</html>
