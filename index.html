<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>วันจุดประทีป</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
margin:0;
padding:0;
text-align:center;

background:linear-gradient(135deg,#fff6d6,#ffe4a3,#ffd27a);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;
}

.container{

background:white;

padding:35px 18px;

border-radius:22px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

max-width:520px;
width:92%;

}

.lamp{

font-size:90px;

animation:flicker 2s infinite;

}

h1{

font-size:38px;

color:#d35400;

margin:10px 0;

}

.counter{

font-size:44px;

font-weight:bold;

color:#e67e22;

margin-top:18px;

line-height:1.4;

}

.details{

font-size:21px;

margin-top:10px;

color:#555;

}

.today{

margin-top:18px;

font-size:18px;

color:#444;

}

@keyframes flicker{

0%,100%{opacity:1;}

50%{opacity:0.85;}

}

/* มือถือ */

@media(max-width:600px){

.lamp{
font-size:75px;
}

h1{
font-size:30px;
}

.counter{
font-size:34px;
}

.details{
font-size:19px;
}

.today{
font-size:17px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="lamp">🪔</div>

<h1>วันจุดประทีป</h1>

<div id="days" class="counter"></div>

<div id="details" class="details"></div>

<div class="today">

เริ่มจุดประทีปตั้งแต่วันที่  
25 มีนาคม พ.ศ. 2564

</div>

<div id="today" class="today"></div>

</div>

<script>

const startDate = new Date('2021-03-25');
const today = new Date();

startDate.setHours(0,0,0,0);
today.setHours(0,0,0,0);

const diffMs = today - startDate;

const days = Math.floor(diffMs/(1000*60*60*24))+1;

document.getElementById("days").innerHTML =
`จุดประทีปบูชาเจดีย์<br>มาแล้ว ${days} วัน`;

/* คำนวณปี เดือน วัน */

let years = today.getFullYear()-startDate.getFullYear();
let months = today.getMonth()-startDate.getMonth();
let daysRemain = today.getDate()-startDate.getDate();

if(daysRemain<0){

months--;

daysRemain+=new Date(today.getFullYear(),today.getMonth(),0).getDate();

}

if(months<0){

years--;

months+=12;

}

document.getElementById("details").innerText =
`เท่ากับ ${years} ปี ${months} เดือน ${daysRemain} วัน`;

/* วันที่วันนี้แบบไทย */

const thaiMonths=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

const day=today.getDate();
const month=thaiMonths[today.getMonth()];
const year=today.getFullYear()+543;

document.getElementById("today").innerText =
`วันนี้วันที่ ${day} ${month} พ.ศ. ${year}`;

</script>

</body>
</html>
